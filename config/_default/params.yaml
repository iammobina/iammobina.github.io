appearance:
  theme_day: light
  font: native
  font_size: M

marketing:
  seo:
    site_type: Person
    org_name: 'Iowa State University'
    description: 'Mobina Kashaniyan — Ph.D. student in Computer Science at Iowa State University. Research in high-performance computing, applied AI, large language models, optimization, and efficient AI systems. Publications include PerfMamba, LLM-Driven AutoML for OCR, and consensus-based serverless auto-scaling.'
    twitter: ''
  analytics:
    google_analytics: ''
  verification:
    google: ''

header:
  navbar:
    enable: true
    align: c
    show_logo: false
    show_language: false
    show_day_night: false
    show_search: false
    highlight_active_link: true

footer:
  copyright:
    notice: '© {year} Mobina Kashaniyan.'
    license:
      enable: false

locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
  address_format: en-us

features:
  syntax_highlighter:
    enable: true
    theme: github-light
    theme_dark: github-light
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: 'https://github.com/iammobina/mobina-academic-site'
    content_dir: content
    branch: main
  avatar:
    gravatar: false
    shape: circle
  comment:
    provider: ''
  search:
    provider: ''
  map:
    provider: ''

extensions:
  academicons:
    enable: true

security:
  allow_frame: true
